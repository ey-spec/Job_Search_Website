<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preload" as="image" href="images/Index.jpg">
</head>
<body>

    <nav>
    <div class="nav-container">
        <div class="nav-logo">
            <a href="index.html">
                <img src="images/logo.png" alt="CareerLink Logo" width="200" height="50">
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a> 
            <a href="signup.html">Sign Up</a>
        </div>
    </div>
</nav>
<div class="bg">
    <div class="container">
        <div class="form-box">
            <h1>Welcome Back!</h1>

            <form action="index.html" method="get">

                <div class="form-group">
                    <label>Username:</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" name="username" placeholder="Enter Your Username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password:</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" name="confirm_password" placeholder="Minimum 8 characters" minlength="8" required>
                    </div>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <div class="form-group">
                    <input type="submit" value="Login">
                </div>

            </form>

            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </div>
</div>

    <footer>
    <div class="footer-links">
        <p>© 2026 CareerLink | <a href="mailto:eyadh3415@gmail.com">Contact Us</a></p>
    </div>
</footer>

</body>
</html>
