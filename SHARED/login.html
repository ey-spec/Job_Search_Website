<!DOCTYPE html>
<html lang="en">
<head>
    <title>CareerLink - Login</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../images/icon_dark.png">
    <link rel="preload" as="image" href="../images/Index.jpg">
</head>
<body>

<nav>
    <div class="nav-container">
        <div class="nav-logo">
            <a href="../SHARED/index.html">
                <img src="../images/logo.png" alt="CareerLink Logo">
            </a>
        </div>
        <div class="nav-links">
            <a href="../SHARED/index.html">Home</a>
            <a href="../SHARED/signup.html">Sign Up</a>
        </div>
    </div>
</nav>

<main>
    <div class="bg">
        <div class="container">
            <div class="form-box">
                <h1>Welcome Back!</h1>

                <form action="../index.html" method="post">

                    <div class="form-group">
                        <label for="username">Username:</label>
                        <div class="input-icon">
                            <i class="fa-solid fa-user" aria-hidden="true"></i>
                            <input type="text" id="username" name="username" 
                            placeholder="Enter your username" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password:</label>
                        <div class="input-icon">
                            <i class="fa-solid fa-lock" aria-hidden="true"></i>
                            <input type="password" id="password" name="password" 
                            placeholder="Enter your password" minlength="8" required>
                        </div>
                        <!-- TODO: link to forgot password page -->
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <div class="form-group">
                        <input type="submit" value="Login">
                    </div>

                </form>

                <p>Don't have an account? <a href="../SHARED/signup.html">Sign Up</a></p>
            </div>
        </div>
    </div>
</main>

<footer>
    <div class="footer-content">
        <div class="footer-brand">
            <p>Linking talent with opportunity.</p>
            <div class="footer-socials">
                <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
        <div class="footer-nav">
            <a href="../USER/jobs.html">Browse Jobs</a>
            <a href="../SHARED/login.html">Login</a>
            <a href="../SHARED/signup.html">Sign Up</a>
            <a href="mailto:eyadh3415@gmail.com">Contact Us</a>
        </div>
    </div>
    <div class="footer-bottom">
        <p>© 2026 CareerLink. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
