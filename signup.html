<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
    <div class="nav-container">
        <div class="nav-logo">
            <a href="index.html">
                <img src="images/logo.png" alt="CareerLink Logo" width="200" height="50">
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a> 
            <a href="login.html">Login</a>
        </div>
    </div>
</nav>

    <div class="container">
        <div class="form-box">
            <h1>Create Your Account</h1>

            <form action="login.html" method="get">

                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" name="username" required>
                </div>

                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" name="email" required>
                </div>

                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" name="password" placeholder="Minimum 8 characters" minlength="8" required >
                </div>

                <div class="form-group">
                    <label>Confirm Password:</label>
                    <input type="password" name="confirm_password" placeholder="Repeat your password" minlength="8" required>
                </div>

                <div class="form-group">
                    <label>Are you a Company Admin?</label>
                    <input type="radio" name="is_company_admin" value="yes"> Yes
                    <input type="radio" name="is_company_admin" value="no" checked> No
                </div>

                <div class="form-group">
                    <label>Company Name: <small>(Only if you are a Company Admin)</small></label>
                    <input type="text" name="company_name">
                </div>

                <div class="form-group">
                    <input type="submit" value="Sign Up">
                </div>

            </form>

            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <footer>
    <div class="footer-links">
        <p>© 2026 CareerLink | <a href="mailto:eyadh3415@gmail.com">Contact Us</a></p>
    </div>
</footer>

</body>
</html>
